<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <style>
      .title { font-family: Inter, Arial, sans-serif; font-size: 82px; font-weight: 900; fill: white; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 34px; font-weight: 600; fill: #dbeafe; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 26px; font-weight: 800; fill: #0f172a; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 600; fill: #475569; }
      .pill { font-family: Inter, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: white; }
      .arrow { stroke: #bfdbfe; stroke-width: 5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#bfdbfe" />
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1300" cy="130" r="220" fill="#60a5fa" opacity="0.12"/>
  <circle cx="180" cy="760" r="260" fill="#a78bfa" opacity="0.12"/>

  <text x="90" y="145" class="title">CareerCompass AI</text>
  <text x="95" y="205" class="subtitle">Multi-Agent Career Path Comparator + Internship Roadmap Planner</text>

  <rect x="95" y="245" width="260" height="46" rx="23" fill="#2563eb"/>
  <text x="225" y="276" class="pill" text-anchor="middle">Kaggle Capstone</text>
  <rect x="375" y="245" width="230" height="46" rx="23" fill="#7c3aed"/>
  <text x="490" y="276" class="pill" text-anchor="middle">Concierge Agents</text>

  <g filter="url(#shadow)">
    <rect x="110" y="365" width="300" height="120" rx="24" fill="#ffffff"/>
    <text x="260" y="415" class="label" text-anchor="middle">Student Profile</text>
    <text x="260" y="450" class="small" text-anchor="middle">skills • interests • deadline</text>
  </g>
  <path d="M410 425 L520 425" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="535" y="345" width="530" height="160" rx="28" fill="#eff6ff"/>
    <text x="800" y="393" class="label" text-anchor="middle">Multi-Agent Workflow</text>
    <text x="800" y="433" class="small" text-anchor="middle">Privacy • Comparator • Skill Gap • Roadmap • Human Approval</text>
    <text x="800" y="468" class="small" text-anchor="middle">ADK-ready + deterministic fallback</text>
  </g>
  <path d="M1065 425 L1175 425" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="1190" y="365" width="300" height="120" rx="24" fill="#ecfdf5"/>
    <text x="1340" y="415" class="label" text-anchor="middle">Career Report</text>
    <text x="1340" y="450" class="small" text-anchor="middle">explainable roadmap</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="180" y="585" width="1240" height="170" rx="30" fill="#ffffff" opacity="0.96"/>
    <text x="245" y="640" class="label">Core Demo Output</text>
    <text x="245" y="685" class="small">✓ Career Path Comparison Matrix</text>
    <text x="630" y="685" class="small">✓ Suitability Index</text>
    <text x="915" y="685" class="small">✓ Deadline-Aware Sprint Plan</text>
    <text x="245" y="725" class="small">✓ Privacy Masking</text>
    <text x="630" y="725" class="small">✓ Human-in-the-Loop Approval</text>
    <text x="1010" y="725" class="small">✓ Evaluation Profiles Passed</text>
  </g>

  <text x="800" y="835" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#dbeafe" text-anchor="middle">Turns student uncertainty into an explainable career roadmap.</text>
</svg>
