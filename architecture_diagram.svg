<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2.2; rx: 16; }
      .special { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2.2; rx: 16; }
      .human { fill: #fff7ed; stroke: #f97316; stroke-width: 2.2; rx: 16; }
      .report { fill: #ecfdf5; stroke: #10b981; stroke-width: 2.2; rx: 16; }
      .text { font-family: Inter, Arial, sans-serif; fill: #0f172a; font-size: 24px; font-weight: 700; text-anchor: middle; }
      .small { font-family: Inter, Arial, sans-serif; fill: #475569; font-size: 16px; font-weight: 500; text-anchor: middle; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .title { font-family: Inter, Arial, sans-serif; fill: #0f172a; font-size: 34px; font-weight: 800; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" width="1100" height="760" />
  <text x="550" y="52" class="title">CareerCompass AI Multi-Agent Architecture</text>

  <rect x="380" y="90" width="340" height="74" class="box" />
  <text x="550" y="123" class="text">Student Profile</text>
  <text x="550" y="148" class="small">skills • interests • deadline • projects</text>

  <path d="M550 164 L550 205" class="arrow" />
  <rect x="360" y="205" width="380" height="82" class="special" />
  <text x="550" y="239" class="text">Privacy &amp; Safety Agent</text>
  <text x="550" y="264" class="small">PII masking • validation • no data retention</text>

  <path d="M550 287 L550 330" class="arrow" />
  <rect x="390" y="330" width="320" height="74" class="box" />
  <text x="550" y="364" class="text">Coordinator Agent</text>
  <text x="550" y="389" class="small">delegates specialist analysis</text>

  <path d="M550 404 L550 440" class="arrow" />
  <path d="M550 440 L245 440 L245 470" class="arrow" />
  <path d="M550 440 L550 470" class="arrow" />
  <path d="M550 440 L855 440 L855 470" class="arrow" />

  <rect x="80" y="470" width="330" height="100" class="box" />
  <text x="245" y="505" class="text">Comparator Agent</text>
  <text x="245" y="531" class="small">career matrix + deterministic scores</text>
  <text x="245" y="552" class="small">skill • interest • feasibility • time</text>

  <rect x="385" y="470" width="330" height="100" class="box" />
  <text x="550" y="505" class="text">Skill Gap Agent</text>
  <text x="550" y="531" class="small">priority gaps • readiness checklist</text>
  <text x="550" y="552" class="small">resume + interview focus</text>

  <rect x="690" y="470" width="330" height="100" class="box" />
  <text x="855" y="505" class="text">Roadmap Agent</text>
  <text x="855" y="531" class="small">deadline-aware internship sprint</text>
  <text x="855" y="552" class="small">weeks + available hours</text>

  <path d="M245 570 L245 610 L550 610" class="arrow" />
  <path d="M550 570 L550 610" class="arrow" />
  <path d="M855 570 L855 610 L550 610" class="arrow" />
  <path d="M550 610 L550 630" class="arrow" />

  <rect x="335" y="630" width="430" height="70" class="human" />
  <text x="550" y="660" class="text">Human Approval Agent</text>
  <text x="550" y="684" class="small">approve or adjust path • hours • deadline</text>

  <path d="M550 700 L550 720" class="arrow" />
  <rect x="335" y="720" width="430" height="34" class="report" />
  <text x="550" y="744" class="text" style="font-size:21px">Final CareerCompass Report</text>
</svg>
