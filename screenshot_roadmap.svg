<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="1000" height="560" rx="24" fill="#f8fafc"/>
  <text x="50" y="58" font-family="Arial" font-size="30" font-weight="800" fill="#0f172a">Deadline-Aware Internship Sprint</text>
  <text x="50" y="92" font-family="Arial" font-size="17" fill="#475569">10 weeks • 12 hours/week • human-approved roadmap</text>
  <g font-family="Arial">
    <line x1="110" y1="145" x2="110" y2="490" stroke="#2563eb" stroke-width="5"/>
    <circle cx="110" cy="160" r="16" fill="#2563eb"/><text x="150" y="168" font-size="20" font-weight="700" fill="#0f172a">Weeks 1–3: Foundation</text><text x="150" y="195" font-size="16" fill="#475569">Data preprocessing, Git, model evaluation</text>
    <circle cx="110" cy="250" r="16" fill="#2563eb"/><text x="150" y="258" font-size="20" font-weight="700" fill="#0f172a">Weeks 4–5: Portfolio Project</text><text x="150" y="285" font-size="16" fill="#475569">Improve ML project, GitHub commits, README documentation</text>
    <circle cx="110" cy="340" r="16" fill="#2563eb"/><text x="150" y="348" font-size="20" font-weight="700" fill="#0f172a">Weeks 6–8: Resume + Interview</text><text x="150" y="375" font-size="16" fill="#475569">Resume bullets, project explanation, technical questions</text>
    <circle cx="110" cy="430" r="16" fill="#2563eb"/><text x="150" y="438" font-size="20" font-weight="700" fill="#0f172a">Weeks 9–10: Applications</text><text x="150" y="465" font-size="16" fill="#475569">Apply to relevant internships, track feedback, iterate</text>
  </g>
</svg>
